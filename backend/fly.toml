app = "hearthstone-mhat"
primary_region = "sjc"

[build]

[env]
  DATABASE_URL = "/data/hearthstone.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "hearthstone_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
